name: Nightly data refresh

on:
  schedule:
    # 04:00 UTC daily — early enough that fresh data is up before EU/AS work hours.
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (don't commit / don't post to Slack)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Refresh exchange rates
        run: npm run refresh-rates

      - name: Refresh fixtures
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SCHEDULER_DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          npm run refresh -- --all 2>&1 | tee refresh.log

      - name: Detect fixture changes
        id: changes
        run: |
          if git diff --quiet HEAD -- 'src/scrapers/sources/__fixtures__/*.json' 'src/scrapers/sources/__fixtures__/*.html' 'src/data/exchange_rates.json'; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No fixture or rate changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --stat HEAD -- 'src/scrapers/sources/__fixtures__/' 'src/data/'
          fi

      - name: Commit refreshed fixtures
        if: steps.changes.outputs.changed == 'true' && inputs.dry_run != true
        run: |
          git config user.name "visa-data-bot"
          git config user.email "data@visalookup.example"
          git add 'src/scrapers/sources/__fixtures__/' 'src/data/'
          git commit -m "data: nightly refresh ($(date -u +%Y-%m-%d))" -m "Workflow run: $GITHUB_RUN_URL"
          git push

      - name: Run source-health check
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: npm run check-sources

      - name: Run link checker
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: npm run check-links || true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: refresh-logs
          path: refresh.log
          retention-days: 30
