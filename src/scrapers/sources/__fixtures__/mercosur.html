<h1>Mercosur</h1>
<p>The Mercosur Residency Agreement (2002) facilitates short-stay travel and temporary/permanent residency among members and associates: Argentina, Brazil, Paraguay, Uruguay (full); Bolivia, Chile, Colombia, Ecuador, Peru (associates).</p>
